# Amplify Hosting build spec — full-stack Gen 2.
# Backend phase deploys amplify/ (Cognito, AppSync/DynamoDB, sweep Lambda,
# AI routes) via pipeline-deploy; frontend phase builds the Vite PWA into dist/.
# Requires the Amplify app to have a service role (Hosting compute role) so
# pipeline-deploy can create backend resources.
version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
